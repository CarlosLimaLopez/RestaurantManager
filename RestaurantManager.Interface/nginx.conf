events { }

http {
    include mime.types;
    types {
        application/wasm wasm;
    }

    server {
        listen 8080;

        root /usr/share/nginx/html;
        index index.html;

        # Servir la interfaz admin desde /
        location / {
            alias /usr/share/nginx/html/;
            try_files $uri $uri/ /index.html =404;
        }
    }
}
